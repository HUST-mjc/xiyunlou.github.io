<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>电子木鱼 · 禧运功德</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      /* 适配iframe背景透明 */
      font-family: system-ui, 'Segoe UI', 'Fira Code', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    /* 主容器：最大宽度 + 水平居中 */
    .muyu-app {
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 248, 235, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 1.8rem 1.2rem;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: all 0.2s;
    }

    /* 统计卡片区域：flex 居中分布 */
    .stats {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
    }

    .stat-card {
      background: rgba(255, 255, 240, 0.8);
      border-radius: 32px;
      padding: 0.8rem 1.2rem;
      min-width: 130px;
      flex: 0 1 auto;
      text-align: center;
    }

    .stat-card h3 {
      font-size: 0.9rem;
      color: #b98f70;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .stat-number {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #d74177, #f39c12);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
    }

    /* 木鱼图片 - 居中可点击 */
    .muyu-img {
      width: 160px;
      max-width: 60%;
      cursor: pointer;
      display: block;
      margin: 1rem auto;
      filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.2));
      transition: transform 0.05s linear;
    }

    .muyu-img:active {
      transform: scale(0.94);
    }

    .hit-effect {
      animation: shake 0.1s ease-in-out 0s 2;
    }

    @keyframes shake {
      0% {
        transform: rotate(0deg) scale(1);
      }

      50% {
        transform: rotate(6deg) scale(1.08);
      }

      100% {
        transform: rotate(0deg) scale(1);
      }
    }

    /* 按钮组：居中 */
    .button-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1.5rem 0 1rem;
    }

    .btn {
      background: #d74177;
      border: none;
      color: white;
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }

    .btn.reset {
      background: #8e9aaf;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    /* 反馈与版本号 居中 */
    .feedback {
      font-size: 0.7rem;
      color: #b98f70;
      border-top: 1px solid #ffe0c0;
      padding-top: 1rem;
      margin-top: 1rem;
      text-align: center;
    }

    .version {
      text-align: center;
      font-size: 0.65rem;
      color: #ccaa88;
      margin-top: 1rem;
    }

    /* 弹窗样式 (保持居中) */
    .modal-mask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-container {
      background: #fff9ef;
      border-radius: 48px;
      max-width: 90%;
      width: 360px;
      padding: 1.5rem;
      position: relative;
      text-align: center;
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #999;
    }

    .ranking-list {
      max-height: 300px;
      overflow-y: auto;
      margin: 1rem 0;
      text-align: left;
    }

    .ranking-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid #f0e0d0;
    }

    .upload-input {
      margin: 1rem auto;
      width: 100%;
    }

    .upload-input input {
      width: 100%;
      padding: 10px;
      border-radius: 30px;
      border: 1px solid #ffc0a0;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="app" class="muyu-app">
    <!-- 统计卡片 -->
    <div class="stats">
      <div class="stat-card">
        <h3>📿 今日敲击</h3>
        <div class="stat-number">{{ count }}</div>
      </div>
      <div class="stat-card">
        <h3>✨ 本次功德</h3>
        <div class="stat-number">{{ meritDisplay }}</div>
      </div>
    </div>

    <!-- 木鱼图片 -->
    <img class="muyu-img" :class="{ 'hit-effect': hitAnim }"
      src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23D48C54' stroke='%238B5A2B' stroke-width='3'/%3E%3Ccircle cx='50' cy='42' r='10' fill='%23B87C3A'/%3E%3Crect x='44' y='70' width='12' height='20' fill='%238B5A2B' rx='3'/%3E%3Ctext x='50' y='85' font-size='12' text-anchor='middle' fill='%23FFE0B5' font-family='monospace'%3E木鱼%3C/text%3E%3C/svg%3E"
      alt="电子木鱼" @click="hitMuyu">

    <!-- 按钮组 -->
    <div class="button-group">
      <button class="btn" @click="openRanking('total')">📜 功德录</button>
      <button class="btn" @click="openRanking('today')">🌟 今日功德</button>
      <button class="btn" @click="showUpload = true">📤 上传功德</button>
      <button class="btn reset" @click="resetToday">🔄 重置今日</button>
    </div>

    <!-- 底部反馈与版本号 -->
    <div class="feedback">
      💡 点击木鱼积攒功德 · 声音“邦邦邦”<br>
      每周四功德翻倍 | 每日次数次日清零
    </div>
    <div class="version">version:1.4.0</div>

    <!-- 功德录/今日功德 弹窗 -->
    <div class="modal-mask" v-if="rankingModalVisible" @click.self="rankingModalVisible = false">
      <div class="modal-container">
        <span class="close-btn" @click="rankingModalVisible = false">&times;</span>
        <h3 style="color:#d74177;">{{ rankingTitle }}</h3>
        <div class="ranking-list">
          <div v-for="(item, idx) in rankingList" :key="idx" class="ranking-item">
            <span>{{ idx+1 }}. {{ item.name }}</span>
            <span style="font-weight:bold;">{{ item.merit }} 功德</span>
          </div>
          <div v-if="rankingList.length === 0" style="text-align:center; padding:20px;">暂无数据</div>
        </div>
      </div>
    </div>

    <!-- 上传功德弹窗 -->
    <div class="modal-mask" v-if="showUpload" @click.self="showUpload = false">
      <div class="modal-container">
        <span class="close-btn" @click="showUpload = false">&times;</span>
        <h3 style="color:#d74177;">📿 上传功德</h3>
        <div class="upload-input">
          <input type="text" v-model="uploadName" placeholder="你的昵称" maxlength="8">
        </div>
        <p style="font-size:0.9rem;">今日总功德：{{ count }} 点</p>
        <button class="btn" @click="submitMerit" :disabled="!canUpload" style="margin-top:0.5rem;">确认上传</button>
        <div v-if="uploadMsg" style="margin-top:12px; color:#d74177;">{{ uploadMsg }}</div>
        <div class="feedback" style="margin-top:12px;">
          ⏰ 每人每天只能上传一次<br>
          📊 功德录按总功德排名，今日功德按当日敲击排名
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    (function () {
      // 存储键名
      const STORAGE = {
        COUNT: 'muyu_today_count',
        LAST_DATE: 'muyu_last_date',
        UPLOAD_DATE: 'muyu_upload_date',
        TOTAL_RANK: 'muyu_total_rank',
        TODAY_RANK: 'muyu_today_rank'
      };

      function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
      }

      function isThursday() {
        return new Date().getDay() === 4;
      }

      // 获取今日敲击次数（自动重置）
      function getTodayCount() {
        const lastDate = localStorage.getItem(STORAGE.LAST_DATE);
        if (lastDate !== getTodayStr()) return 0;
        return parseInt(localStorage.getItem(STORAGE.COUNT) || '0');
      }

      function incrementCount(inc = 1) {
        let newCount = getTodayCount() + inc;
        localStorage.setItem(STORAGE.COUNT, newCount);
        localStorage.setItem(STORAGE.LAST_DATE, getTodayStr());
        return newCount;
      }

      function resetTodayCount() {
        localStorage.setItem(STORAGE.COUNT, '0');
        localStorage.setItem(STORAGE.LAST_DATE, getTodayStr());
      }

      // 功德榜
      function getRanking(type) {
        const key = type === 'total' ? STORAGE.TOTAL_RANK : STORAGE.TODAY_RANK;
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : [];
      }

      function saveRanking(type, list) {
        const key = type === 'total' ? STORAGE.TOTAL_RANK : STORAGE.TODAY_RANK;
        localStorage.setItem(key, JSON.stringify(list));
      }

      function updateRanking(name, todayMerit) {
        // 总榜
        let total = getRanking('total');
        let existTotal = total.find(i => i.name === name);
        if (existTotal) existTotal.merit += todayMerit;
        else total.push({ name, merit: todayMerit });
        total.sort((a, b) => b.merit - a.merit);
        saveRanking('total', total);
        // 今日榜
        let today = getRanking('today');
        let existToday = today.find(i => i.name === name);
        if (existToday) existToday.merit += todayMerit;
        else today.push({ name, merit: todayMerit });
        today.sort((a, b) => b.merit - a.merit);
        saveRanking('today', today);
      }

      function hasUploadedToday() {
        return localStorage.getItem(STORAGE.UPLOAD_DATE) === getTodayStr();
      }
      function setUploadedToday() {
        localStorage.setItem(STORAGE.UPLOAD_DATE, getTodayStr());
      }

      // 音效 (Web Audio)
      let audioCtx = null;
      function playBang() {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const now = audioCtx.currentTime;
          const gain = audioCtx.createGain();
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
          gain.connect(audioCtx.destination);
          const osc1 = audioCtx.createOscillator();
          osc1.frequency.value = 380;
          osc1.type = 'sine';
          osc1.connect(gain);
          osc1.start(now);
          osc1.stop(now + 0.15);
          const osc2 = audioCtx.createOscillator();
          osc2.frequency.value = 760;
          osc2.type = 'triangle';
          osc2.connect(gain);
          osc2.start(now);
          osc2.stop(now + 0.12);
          audioCtx.resume();
        } catch (e) { console.warn(e); }
      }

      // Vue 组件
      const App = {
        data() {
          return {
            count: 0,
            meritDisplay: '+0',
            hitAnim: false,
            rankingModalVisible: false,
            rankingTitle: '',
            rankingList: [],
            showUpload: false,
            uploadName: '',
            uploadMsg: '',
            canUpload: false
          };
        },
        created() {
          this.loadCount();
          window.addEventListener('storage', (e) => {
            if (e.key === STORAGE.COUNT || e.key === STORAGE.LAST_DATE) this.loadCount();
          });
        },
        methods: {
          loadCount() {
            this.count = getTodayCount();
          },
          hitMuyu() {
            let add = isThursday() ? 2 : 1;
            this.meritDisplay = `+${add}`;
            setTimeout(() => { this.meritDisplay = '+0'; }, 500);
            const newCount = incrementCount(add);
            this.count = newCount;
            playBang();
            this.hitAnim = true;
            setTimeout(() => { this.hitAnim = false; }, 150);
          },
          resetToday() {
            if (confirm('确定重置今日敲击次数吗？')) {
              resetTodayCount();
              this.loadCount();
            }
          },
          openRanking(type) {
            this.rankingTitle = type === 'total' ? '📜 功德录（总榜）' : '🌟 今日功德榜';
            this.rankingList = getRanking(type);
            this.rankingModalVisible = true;
          },
          submitMerit() {
            if (!this.uploadName.trim()) {
              this.uploadMsg = '请输入昵称';
              return;
            }
            if (hasUploadedToday()) {
              this.uploadMsg = '今日已上传过功德，请明天再来';
              return;
            }
            if (this.count === 0) {
              this.uploadMsg = '今日还未敲击木鱼，无功德可上传';
              return;
            }
            updateRanking(this.uploadName.trim(), this.count);
            setUploadedToday();
            this.uploadMsg = '上传成功！功德已记录';
            setTimeout(() => {
              this.showUpload = false;
              this.uploadMsg = '';
              this.uploadName = '';
            }, 1500);
          }
        },
        watch: {
          uploadName(val) {
            this.canUpload = val.trim().length > 0 && !hasUploadedToday() && this.count > 0;
          },
          showUpload(val) {
            if (!val) {
              this.uploadName = '';
              this.uploadMsg = '';
              this.canUpload = false;
            } else {
              this.canUpload = this.uploadName.trim().length > 0 && !hasUploadedToday() && this.count > 0;
            }
          }
        }
      };
      Vue.createApp(App).mount('#app');
    })();
  </script>
</body>

</html>
